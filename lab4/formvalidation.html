<!DOCTYPE html>
<html>
<head>
    <title>Person Profile</title>

    <script>
        function Validation() {

            // ---------- NAME ----------
            let name = document.getElementById("name").value.trim();

            if (name == "") {
                alert("Name cannot be empty");
                return false;
            }

            if (name.split("").length < 2) {
                alert("Name must contain at least two words");
                return false;
            }

            let firstChar = name[0];
            if (!((firstChar >= 'A' && firstChar <= 'Z') || (firstChar >= 'a' && firstChar <= 'z'))) {
                alert("Name must start with a letter");
                return false;
            }

            for (let i = 0; i < name.length; i++) {
                let ch = name[i];
                if (!(
                    (ch >= 'A' && ch <= 'Z') ||
                    (ch >= 'a' && ch <= 'z') ||
                    ch == '.' || ch == '-' || ch == ' '
                )) {
                    alert("Name can contain only letters, dot(.) or dash(-)");
                    return false;
                }
            }

            // ---------- EMAIL ----------
            let email = document.getElementById("email").value.trim();

            if (email == "") {
                alert("Email cannot be empty");
                return false;
            }

            if (email.includes(" ")) {
                alert("Email cannot contain space");
                return false;
            }

            if (!email.includes("@")) {
                alert("Invalid email address (must contain @)");
                return false;
            }

            if (email.startsWith("@") || email.endsWith("@")) {
                alert("Invalid email address (@ cannot be first/last)");
                return false;
            }

            if (email.endsWith(".")) {
                alert("Invalid email address (dot cannot be last)");
                return false;
            }

            // ---------- GENDER ----------
            let male = document.getElementsByName("gender")[0];
            let female = document.getElementsByName("gender")[1];
            let other = document.getElementsByName("gender")[2];

            if (!male.checked && !female.checked && !other.checked) {
                alert("Please select Gender");
                return false;
            }

            // ---------- DOB ----------
            let dd = document.getElementById("dd").value.trim();
            let mm = document.getElementById("mm").value.trim();
            let yyyy = document.getElementById("yyyy").value.trim();

            if (dd == "" || mm == "" || yyyy == "") {
                alert("Date of Birth cannot be empty");
                return false;
            }

            for (let i = 0; i < dd.length; i++) {
                if (dd[i] < '0' || dd[i] > '9') { 
                    alert("Day must be a number");
                     return false; }
            }
            for (let i = 0; i < mm.length; i++) {
                if (mm[i] < '0' || mm[i] > '9') { 
                    alert("Month must be a number");
                     return false; }
            }
            for (let i = 0; i < yyyy.length; i++) {
                if (yyyy[i] < '0' || yyyy[i] > '9') {
                     alert("Year must be a number"); 
                     return false; }
            }

            if (dd < 1 || dd > 31) { 
                alert("Day must be between 1-31"); 
                return false; }

            if (mm < 1 || mm > 12) { 
                alert("Month must be between 1-12"); 
                return false; }

            if (yyyy < 1900 || yyyy > 2016) { 
                alert("Year must be between 1900-2016");
                 return false; }

            // ---------- BLOOD GROUP ----------
            let blood = document.getElementById("blood").value;
            if (blood == "") {
                alert("Please select Blood Group");
                return false;
            }

            // ---------- DEGREE ----------
            let ssc = document.getElementsByName("degree")[0];
            let hsc = document.getElementsByName("degree")[1];
            let bsc = document.getElementsByName("degree")[2];
            let msc = document.getElementsByName("degree")[3];

            if (!ssc.checked && !hsc.checked && !bsc.checked && !msc.checked) {
                alert("At least one degree must be selected");
                return false;
            }

            // ---------- PHOTO ----------
            let photo = document.getElementById("photo").value;
            if (photo == "") {
                alert("Photo cannot be empty");
                return false;
            }

            return true;
        }
    </script>
</head>

<body>

<form onsubmit="return Validation()">
<table border="1" width="500" align="center" cellspacing="0" cellpadding="8">

    <tr>
        <td colspan="3" align="center">
            <h2>PERSON PROFILE</h2>
        </td>
    </tr>

    <tr>
        <td width="150">Name</td>
        <td><input type="text" id="name"></td>
        <td width="20"></td>
    </tr>

    <tr>
        <td>Email</td>
        <td><input type="text" id="email"></td>
        <td width="20"></td>
    </tr>

    <tr>
        <td>Gender</td>
        <td>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
            <input type="radio" name="gender" value="other"> Other
        </td>
        <td width="20"></td>
    </tr>

    <tr>
        <td>Date of Birth</td>
        <td>
            <input type="text" id="dd" size="2"> /
            <input type="text" id="mm" size="2"> /
            <input type="text" id="yyyy" size="4"> (dd/mm/yyyy)
        </td>
        <td width="20"></td>
    </tr>

    <tr>
        <td>Blood Group</td>
        <td>
            <select id="blood">
                <option value="">Select</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </td>
        <td width="20"></td>
    </tr>

    <tr>
        <td>Degree</td>
        <td>
            <input type="checkbox" name="degree" value="ssc"> SSC
            <input type="checkbox" name="degree" value="hsc"> HSC
            <input type="checkbox" name="degree" value="bsc"> BSc.
            <input type="checkbox" name="degree" value="msc"> MSc.
        </td>
        <td width="20"></td>
    </tr>

    <tr>
        <td>Photo</td>
        <td colspan="2"><input type="file" id="photo"></td>
    </tr>

    <tr>
    <td colspan="3" height="20"></td>
    </tr>
    
    <tr>
        <td colspan="3" align="center">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </td>
    </tr>

</table>
</form>

</body>
</html>
